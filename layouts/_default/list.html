{{ define "main" }}
<div class="home">
    <h1>{{ .Title | default "Archive" }}</h1>
    <ul class="post-list">
        {{ range .Paginator.Pages }}
        <li>
            <time>{{ .Date.Format "2006-01-02" }}</time>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
    </ul>
    {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
