{{ define "main" }}
<article class="post">
    <header>
        <time>{{ .Date.Format "January 02, 2006" }}</time>
        <h1>{{ .Title }}</h1>
        <div class="tags">{{ range .Params.tags }}<span>#{{ . }}</span> {{ end }}</div>
    </header>
    {{ with .Params.image }}<img src="{{ . }}" alt="{{ $.Title }}" class="hero-img">{{ end }}
    <div class="content">{{ .Content }}</div>
    <nav class="pn">
        {{ with .PrevInSection }}<a href="{{ .Permalink }}">← {{ .Title }}</a>{{ end }}
        {{ with .NextInSection }}<a href="{{ .Permalink }}">{{ .Title }} →</a>{{ end }}
    </nav>
</article>
{{ end }}
