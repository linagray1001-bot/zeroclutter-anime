{{ define "main" }}
<div class="home">
    <h1 class="home-title">{{ .Site.Title }}</h1>
    <p class="home-desc">{{ .Site.Params.description }}</p>
    <ul class="post-list">
        {{ range first 20 (where .Site.RegularPages "Section" "posts") }}
        <li>
            <time>{{ .Date.Format "2006-01-02" }}</time>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
